version: '3.7'

networks:
  arta_net:
    name: arta_net

services:
  orderer.example.com:
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
    ports:
      - 7050:7050
    networks:
      - arta_net

  peer0.padiwangi.arta.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_PEER_ID=peer0.padiwangi.arta.com
      - CORE_PEER_ADDRESS=peer0.padiwangi.arta.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.padiwangi.arta.com:7051
      - CORE_PEER_LOCALMSPID=PadiwangiMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/padiwangi.arta.com/peers/peer0.padiwangi.arta.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - 7051:7051
    networks:
      - arta_net

  # Note: Add the remaining 5 peers here similarly when executing the network
  # Ports can be mapped to 8051, 9051, 10051, 11051, 12051 for each MSP
