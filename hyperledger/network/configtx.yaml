Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &PadiwangiMSP
    Name: PadiwangiMSP
    ID: PadiwangiMSP
    MSPDir: crypto-config/peerOrganizations/padiwangi.arta.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('PadiwangiMSP.admin', 'PadiwangiMSP.peer', 'PadiwangiMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('PadiwangiMSP.admin', 'PadiwangiMSP.client')"
